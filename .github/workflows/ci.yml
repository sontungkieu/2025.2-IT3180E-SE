name: CI

on:
  push: {}
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Test, coverage and browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Static checks
        run: npm run check

      - name: Backend tests with coverage
        run: npm run test:coverage

      - name: UI smoke
        run: npm run smoke:ui

      - name: UC smoke
        run: npm run smoke:uc

      - name: Whitespace diff check
        run: git diff --check

  container:
    name: Build deployable container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ecopark-bicycle-parking .
